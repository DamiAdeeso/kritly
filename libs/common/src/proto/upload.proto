syntax = "proto3";

package upload;

// Upload Service — presigned direct-to-storage uploads
// RPC success returns PresignedUploadData only (no statusCode/message wrapper).
service UploadService {
  rpc CreatePresignedUpload(CreatePresignedUploadRequest) returns (PresignedUploadData);
}

message CreatePresignedUploadRequest {
  string userId = 1;
  string purpose = 2;
  string contentType = 3;
  string fileName = 4;
  int64 fileSize = 5;
}

message PresignedUploadData {
  string uploadUrl = 1;
  string fileKey = 2;
  string publicUrl = 3;
  int64 expiresAt = 4;
}
