syntax = "proto3";

package user;

import "auth.proto";
import "profile.proto";
import "google/protobuf/empty.proto";

// User / profile service (hosted in auth-service for now; extractable later)
// RPC success returns data messages only (no statusCode/message wrapper).
// New endpoint checklist:
// 1. Add rpc + messages here
// 2. npm run proto:generate
// 3. Implement in auth-service (profile.service.ts + user.grpc.implementation.ts)
// 4. Add passthrough in gateway UserClientService
// 5. Add thin HTTP route in gateway user.gateway.controller.ts (mapGrpcToHttp / mapGrpcEmptyToHttp)
service UserService {
  rpc GetProfile(GetProfileRequest) returns (profile.ProfileData);
  rpc GetProfileByUsername(GetProfileByUsernameRequest) returns (profile.ProfileData);
  rpc CheckUsername(CheckUsernameRequest) returns (UsernameAvailabilityData);
  rpc SetUsername(SetUsernameRequest) returns (auth.AuthData);
  rpc UpdateAvatar(UpdateAvatarRequest) returns (google.protobuf.Empty);
  rpc UpdateProfile(UpdateProfileRequest) returns (google.protobuf.Empty);
}

message GetProfileRequest {
  string userId = 1;
}

message GetProfileByUsernameRequest {
  string username = 1;
}

message CheckUsernameRequest {
  string username = 1;
}

message SetUsernameRequest {
  string userId = 1;
  string username = 2;
}

message UpdateAvatarRequest {
  string userId = 1;
  string avatar = 2;
}

message UpdateProfileRequest {
  string userId = 1;
  string displayName = 2;
  optional string bio = 3;
}

message UsernameAvailabilityData {
  bool isAvailable = 1;
}
