syntax = "proto3";

package verification;

service VerificationService {
  rpc SendOtp(SendOtpRequest) returns (SendOtpResponse);
  rpc VerifyOtp(VerifyOtpRequest) returns (VerifyOtpResponse);
  rpc ValidateVerificationToken(ValidateVerificationTokenRequest) returns (ValidateVerificationTokenResponse);
}

message SendOtpRequest {
  string subject = 1;
  string purpose = 2;
  string channel = 3;
  optional string userId = 4;
}

message SendOtpData {
  int64 expiresAt = 1;
  int32 expiresInSeconds = 2;
}

message SendOtpResponse {
  int32 statusCode = 1;
  string message = 2;
  SendOtpData data = 3;
}

message VerifyOtpRequest {
  string subject = 1;
  string purpose = 2;
  string code = 3;
}

message VerifyOtpData {
  string verificationToken = 1;
  int64 expiresAt = 2;
}

message VerifyOtpResponse {
  int32 statusCode = 1;
  string message = 2;
  VerifyOtpData data = 3;
}

message ValidateVerificationTokenRequest {
  string verificationToken = 1;
  string purpose = 2;
  string userId = 3;
}

message ValidateVerificationTokenData {
  bool isValid = 1;
}

message ValidateVerificationTokenResponse {
  int32 statusCode = 1;
  string message = 2;
  ValidateVerificationTokenData data = 3;
}
