syntax = "proto3";

package verification;

// RPC success returns data messages only (no statusCode/message wrapper).
service VerificationService {
  rpc SendOtp(SendOtpRequest) returns (SendOtpData);
  rpc VerifyOtp(VerifyOtpRequest) returns (VerifyOtpData);
  rpc ValidateVerificationToken(ValidateVerificationTokenRequest) returns (ValidateVerificationTokenData);
  rpc ConsumeVerificationToken(ConsumeVerificationTokenRequest) returns (ValidateVerificationTokenData);
}

message SendOtpRequest {
  string subject = 1;
  string purpose = 2;
  string channel = 3;
  optional string userId = 4;
}

message SendOtpData {
  int64 expiresAt = 1;
  int32 expiresInSeconds = 2;
}

message VerifyOtpRequest {
  string subject = 1;
  string purpose = 2;
  string code = 3;
}

message VerifyOtpData {
  string verificationToken = 1;
  int64 expiresAt = 2;
}

message ValidateVerificationTokenRequest {
  string verificationToken = 1;
  string purpose = 2;
  optional string userId = 3;
  optional string email = 4;
}

message ConsumeVerificationTokenRequest {
  string verificationToken = 1;
  string purpose = 2;
  optional string userId = 3;
  optional string email = 4;
}

message ValidateVerificationTokenData {
  bool isValid = 1;
}
