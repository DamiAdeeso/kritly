syntax = "proto3";

package auth;

// New endpoint checklist:
// 1. Add rpc + messages here
// 2. npm run proto:generate
// 3. Implement in auth-service (auth.service.ts + auth.grpc.controller.ts)
// 4. Add passthrough in gateway AuthClientService
// 5. Add thin HTTP route in gateway auth.gateway.controller.ts

// Auth Service — credentials, sessions, tokens
service AuthService {
  rpc Register(RegisterRequest) returns (AuthResponse);
  rpc Login(LoginRequest) returns (AuthResponse);
  rpc SocialLogin(SocialLoginRequest) returns (AuthResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (AuthResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc ResetPassword(ResetPasswordRequest) returns (UpdateProfileResponse);
  rpc ChangePassword(ChangePasswordRequest) returns (UpdateProfileResponse);
  rpc CheckEmailAvailability(CheckEmailRequest) returns (EmailAvailabilityResponse);
}

// Request/Response messages
message RegisterRequest {
  string email = 1;
  string password = 2;
  optional string username = 3;
  string verificationToken = 4;
  string dateOfBirth = 5; // ISO date YYYY-MM-DD
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message SocialLoginRequest {
  string provider = 1; // google, facebook, apple, instagram
  optional string accessToken = 2; // facebook, instagram — OAuth access token
  optional string idToken = 7; // google, apple — OpenID ID token from client SDK
  optional string authorizationCode = 8; // apple web OAuth authorization code
}

message RefreshTokenRequest {
  string refreshToken = 1;
}

message LogoutRequest {
  string refreshToken = 1;
}

message ValidateTokenRequest {
  string accessToken = 1;
}

message ResetPasswordRequest {
  string email = 1;
  string newPassword = 2;
  string verificationToken = 3;
}

message ChangePasswordRequest {
  string userId = 1;
  string currentPassword = 2;
  string newPassword = 3;
  string verificationToken = 4;
}

message CheckEmailRequest {
  string email = 1;
}

message EmailAvailabilityData {
  bool isAvailable = 1;
}

message EmailAvailabilityResponse {
  int32 statusCode = 1;
  string message = 2;
  EmailAvailabilityData data = 3;
}

// Shared response envelope: statusCode, message, data
message EmptyData {}

message AuthData {
  string accessToken = 1;
  string refreshToken = 2;
  string userId = 3;
  string email = 4;
}

message AuthResponse {
  int32 statusCode = 1;
  string message = 2;
  AuthData data = 3;
}

message LogoutResponse {
  int32 statusCode = 1;
  string message = 2;
  EmptyData data = 3;
}

message ValidateTokenData {
  bool isValid = 1;
  string userId = 2;
  string email = 3;
}

message ValidateTokenResponse {
  int32 statusCode = 1;
  string message = 2;
  ValidateTokenData data = 3;
}

message UpdateProfileResponse {
  int32 statusCode = 1;
  string message = 2;
  EmptyData data = 3;
}
