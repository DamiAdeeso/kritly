syntax = "proto3";

package auth;

import "google/protobuf/empty.proto";
import "profile.proto";

// New endpoint checklist:
// 1. Add rpc + messages here
// 2. npm run proto:generate
// 3. Implement in auth-service (auth.service.ts + auth.grpc.implementation.ts)
// 4. Add passthrough in gateway AuthClientService
// 5. Add thin HTTP route in gateway auth.gateway.controller.ts

// Auth Service — credentials, sessions, tokens.
// Token validation: gateway GET /api/auth/validate (JWT at the edge, not an RPC).
service AuthService {
  rpc Register(RegisterRequest) returns (AuthData);
  rpc Login(LoginRequest) returns (AuthData);
  rpc LoginSession(LoginRequest) returns (LoginSessionData);
  rpc SocialLogin(SocialLoginRequest) returns (AuthData);
  rpc RefreshToken(RefreshTokenRequest) returns (AuthData);
  rpc Logout(LogoutRequest) returns (google.protobuf.Empty);
  rpc ResetPassword(ResetPasswordRequest) returns (google.protobuf.Empty);
  rpc ChangePassword(ChangePasswordRequest) returns (google.protobuf.Empty);
  rpc CheckEmailAvailability(CheckEmailRequest) returns (EmailAvailabilityData);
}

message RegisterRequest {
  string email = 1;
  string password = 2;
  optional string username = 3;
  string verificationToken = 4;
  string dateOfBirth = 5; // ISO date YYYY-MM-DD
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message SocialLoginRequest {
  string provider = 1; // google, facebook, apple, instagram
  optional string accessToken = 2; // facebook, instagram — OAuth access token
  reserved 3 to 6;
  optional string idToken = 7; // google, apple — OpenID ID token from client SDK
  optional string authorizationCode = 8; // apple web OAuth authorization code
}

message RefreshTokenRequest {
  string refreshToken = 1;
}

message LogoutRequest {
  string refreshToken = 1;
}

message ResetPasswordRequest {
  string email = 1;
  string newPassword = 2;
  string verificationToken = 3;
}

message ChangePasswordRequest {
  string userId = 1;
  string currentPassword = 2;
  string newPassword = 3;
  string verificationToken = 4;
}

message CheckEmailRequest {
  string email = 1;
}

message EmailAvailabilityData {
  bool isAvailable = 1;
}

message AuthData {
  string accessToken = 1;
  string refreshToken = 2;
  string userId = 3;
  string email = 4;
}

/** Login tokens plus profile from the same user row (no extra DB round trip). */
message LoginSessionData {
  string accessToken = 1;
  string refreshToken = 2;
  profile.ProfileData profile = 3;
}
