version: v2
clean: true
plugins:
  - local: protoc-gen-ts_proto
    out: src/generated
    opt:
      - outputServices=none
      - outputEncodeMethods=false
      - outputJsonMethods=false
      - outputPartialMethods=false
      - esModuleInterop=true
      - useOptionals=messages
      - env=node
      - snakeToCamel=true
