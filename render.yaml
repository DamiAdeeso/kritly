# Render Blueprint — FREE tier (Hobby)
# https://render.com/docs/free
#
# Render has NO free private services (pserv). This blueprint runs gateway + auth +
# upload + notification in ONE free web instance (localhost gRPC). Postgres + Redis
# use free instance types. Builds use pnpm (see packageManager in package.json).
#
# Limits:
#   - Web spins down after 15 min idle (cold starts)
#   - Free web cannot use SMTP ports 25/465/587 — use an HTTP email API or external SMTP
#   - RabbitMQ: set RABBITMQ_URL (e.g. CloudAMQP free tier) in the dashboard
#   - ~512 MB RAM for all four Node processes — hobby / preview only
#
# Paid multi-service layout: see render.starter.yaml

services:
  - type: web
    name: kritly
    runtime: node
    plan: free
    region: oregon
    buildCommand: >-
      corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm exec nx run-many -t build
      --projects=gateway,auth-service,upload-service,notification-service
      --configuration=production &&
      pnpm run db:deploy
    startCommand: sh scripts/render-start-all.sh
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: GRPC_USE_TLS
        value: "false"
      - key: AUTH_SERVICE_HOST
        value: 127.0.0.1
      - key: AUTH_SERVICE_PORT
        value: "3001"
      - key: UPLOAD_SERVICE_HOST
        value: 127.0.0.1
      - key: UPLOAD_SERVICE_PORT
        value: "3002"
      - key: NOTIFICATION_SERVICE_HOST
        value: 127.0.0.1
      - key: NOTIFICATION_SERVICE_GRPC_PORT
        value: "3003"
      - key: DATABASE_URL
        fromDatabase:
          name: kritly-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: kritly-redis
          property: connectionString
      - key: RABBITMQ_URL
        sync: false
      - key: RABBITMQ_NOTIFICATION_QUEUE
        value: notification-service.send
      - key: GATEWAY_PUBLIC_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: OAUTH_SUCCESS_REDIRECT_URL
        sync: false
      - key: NOTIFICATION_APP_URL
        sync: false
      - key: OAUTH_STATE_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: FACEBOOK_CLIENT_ID
        sync: false
      - key: FACEBOOK_CLIENT_SECRET
        sync: false
      - key: FACEBOOK_CALLBACK_URL
        sync: false
      - key: APPLE_CLIENT_ID
        sync: false
      - key: APPLE_TEAM_ID
        sync: false
      - key: APPLE_PRIVATE_KEY
        sync: false
      - key: APPLE_CLIENT_SECRET
        sync: false
      - key: APPLE_CALLBACK_URL
        sync: false
      - key: INSTAGRAM_CLIENT_ID
        sync: false
      - key: INSTAGRAM_CLIENT_SECRET
        sync: false
      - key: INSTAGRAM_CALLBACK_URL
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_PUBLIC_URL_BASE
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_SECURE
        value: "false"
      - key: NOTIFICATION_SUPPORT_EMAIL
        value: support@kritly.com
      - key: NOTIFICATION_TEMPLATE_CACHE_TTL
        value: "1800"
      - key: UPLOAD_PRESIGNED_URL_TTL
        value: "900"

  - type: redis
    name: kritly-redis
    plan: free
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: kritly-db
    plan: free
    region: oregon
    databaseName: kritly
    user: kritly
