version: '3.8'

services:
  # Auth Service (Development with hot reload)
  auth-service:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
      target: builder
    container_name: rev-auth-service-dev
    ports:
      - "3001:3001"  # gRPC port
    environment:
      - NODE_ENV=local
      - DATABASE_URL=postgresql://rev_user:rev_password@postgres:5432/rev_db
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379
      - AUTH_SERVICE_HOST=auth-service
      - RABBITMQ_URL=amqp://kritly:kritly@rabbitmq:5672
    env_file:
      - .env
    volumes:
      - ./apps/auth-service:/app/apps/auth-service
      - ./libs/common:/app/libs/common
      - /app/apps/auth-service/node_modules
      - /app/libs/common/node_modules
      - /app/node_modules
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - rev-network
    command: npx nx serve auth-service
    restart: unless-stopped

  # Gateway Service (Development with hot reload)
  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
      target: builder
    container_name: rev-gateway-dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=local
      - DATABASE_URL=postgresql://rev_user:rev_password@postgres:5432/rev_db
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379
      - AUTH_SERVICE_HOST=auth-service
      - UPLOAD_SERVICE_HOST=upload-service
      - UPLOAD_SERVICE_PORT=3002
      - NOTIFICATION_SERVICE_HOST=notification-service
      - NOTIFICATION_SERVICE_GRPC_PORT=3003
    env_file:
      - .env
    volumes:
      - ./apps/gateway:/app/apps/gateway
      - ./libs/common:/app/libs/common
      - /app/apps/gateway/node_modules
      - /app/libs/common/node_modules
      - /app/node_modules
    depends_on:
      - auth-service
      - upload-service
    networks:
      - rev-network
    command: npx nx serve gateway
    restart: unless-stopped

  # PostgreSQL Database (for development)
  postgres:
    image: postgres:15-alpine
    container_name: rev-postgres-dev
    environment:
      - POSTGRES_DB=rev_db
      - POSTGRES_USER=rev_user
      - POSTGRES_PASSWORD=rev_password
    ports:
      - "5433:5432"  # host 5433 avoids clash with system PostgreSQL on 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rev-network
    restart: unless-stopped

  # Redis (for development)
  redis:
    image: redis:7-alpine
    container_name: rev-redis-dev
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - rev-network
    restart: unless-stopped

  # RabbitMQ (for async notifications)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rev-rabbitmq-dev
    ports:
      - "5673:5672"  # host 5673 avoids clash with other RabbitMQ/AMQP on 5672
      - "15673:15672"  # management UI — http://localhost:15673 (kritly/kritly)
    environment:
      RABBITMQ_DEFAULT_USER: kritly
      RABBITMQ_DEFAULT_PASS: kritly
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - rev-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Notification Service (RMQ worker)
  notification-service:
    build:
      context: .
      dockerfile: apps/notification-service/Dockerfile
      target: builder
    container_name: rev-notification-service-dev
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=local
      - NOTIFICATION_SERVICE_GRPC_PORT=3003
      - DATABASE_URL=postgresql://rev_user:rev_password@postgres:5432/rev_db
      - RABBITMQ_URL=amqp://kritly:kritly@rabbitmq:5672
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    volumes:
      - ./apps/notification-service:/app/apps/notification-service
      - ./libs/common:/app/libs/common
      - /app/apps/notification-service/node_modules
      - /app/libs/common/node_modules
      - /app/node_modules
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - rev-network
    command: npx nx serve notification-service
    restart: unless-stopped

  # Upload Service (presigned direct-to-storage uploads)
  upload-service:
    build:
      context: .
      dockerfile: apps/upload-service/Dockerfile
      target: builder
    container_name: rev-upload-service-dev
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=local
      - UPLOAD_SERVICE_PORT=3002
      - S3_BUCKET=kritly-uploads
      - S3_REGION=auto
    env_file:
      - .env
    volumes:
      - ./apps/upload-service:/app/apps/upload-service
      - ./libs/common:/app/libs/common
      - /app/apps/upload-service/node_modules
      - /app/libs/common/node_modules
      - /app/node_modules
    networks:
      - rev-network
    command: npx nx serve upload-service
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local

networks:
  rev-network:
    driver: bridge
